server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # env.js — bez cache (generowany dynamicznie przy starcie kontenera)
    location = /env.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy do Pstryk Cloud API — rozwiązuje problem CORS.
    # Przeglądarka wywołuje /pstryk-api/..., nginx przekazuje do api.pstryk.pl/integrations/...
    location /pstryk-api/ {
        proxy_pass         https://api.pstryk.pl/integrations/;
        proxy_ssl_server_name on;
        proxy_set_header   Host              api.pstryk.pl;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Przekaż Authorization header z przeglądarki do Pstryk API
        proxy_pass_header  Authorization;

        # Usuń nagłówki CORS z odpowiedzi Pstryk — nginx sam je doda
        proxy_hide_header  Access-Control-Allow-Origin;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # Zasoby statyczne
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
